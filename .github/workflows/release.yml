name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for manual runs (e.g. v0.0.1-test)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NextUI (build dependencies)
        uses: actions/checkout@v4
        with:
          repository: LoveRetro/NextUI
          path: NextUI

      - name: Checkout Music Player
        uses: actions/checkout@v4
        with:
          path: NextUI/workspace/nextui-music-player

      - name: Build for tg5040
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/NextUI/workspace:/root/workspace" \
            ghcr.io/loveretro/tg5040-toolchain:latest \
            /bin/bash -c 'source /root/.bashrc && cd /root/workspace/tg5040/libmsettings && make build CROSS_COMPILE=aarch64-nextui-linux-gnu- PREFIX=/opt/nextui PREFIX_LOCAL=/opt/nextui && cd /root/workspace/nextui-music-player/src && make PLATFORM=tg5040'

      - name: Package release zip
        run: |
          cd "${{ github.workspace }}/NextUI/workspace/nextui-music-player"
          sudo chown -R "$(id -u):$(id -g)" .
          rm -rf .github src .git .gitignore LICENSE README.md
          zip -r ../Music.Player.pak.zip .

      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "target=" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.release_tag }}"
            if [ -z "$TAG" ]; then
              TAG="manual-${{ github.run_number }}"
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload pak artifact
        uses: actions/upload-artifact@v4
        with:
          name: Music.Player.pak-${{ steps.version.outputs.tag }}
          path: NextUI/workspace/Music.Player.pak.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP="${{ github.workspace }}/NextUI/workspace/Music.Player.pak.zip"
          TAG="${{ steps.version.outputs.tag }}"
          TARGET="${{ steps.version.outputs.target }}"
          if [ -n "$TARGET" ]; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --target "$TARGET" \
              --generate-notes \
              "$ZIP"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes \
              "$ZIP"
          fi
